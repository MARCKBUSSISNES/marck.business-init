<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Splash</title>
  <style>
    :root{
      --bg:#071423;
      --panel:rgba(10, 26, 45, .88);
      --border:rgba(255,255,255,.12);
      --celeste:#33D6FF;
      --naranja:#FF8A1F;
      --txt:#ffffff;
    }
    body{
      margin:0; height:100vh; display:grid; place-items:center;
      background:
        radial-gradient(700px 420px at 18% 18%, rgba(51,214,255,.28), transparent 60%),
        radial-gradient(700px 420px at 85% 25%, rgba(255,138,31,.22), transparent 60%),
        linear-gradient(180deg, #06111f, var(--bg));
      color:var(--txt);
      font-family:system-ui,Segoe UI,Roboto,Arial;
      user-select:none;
    }
    .box{
      width:100vw; height:100vh;
      border-radius:0;
      background: transparent;
      border:none;
      box-shadow:none;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:12px;
      position:relative;
      overflow:hidden;
      transition: opacity .25s ease, filter .25s ease, transform .25s ease;
    }
    .box.exit{ opacity:0; filter: blur(1px); transform: scale(.995); }
 opacity:0; transform: scale(.985); filter: blur(1px); }
    
    /* Premium animated backdrop */
    body::before, body::after{
      content:"";
      position:fixed;
      inset:-20%;
      pointer-events:none;
      z-index:-1;
      filter: blur(30px);
      opacity:.85;
      transform: translate3d(0,0,0);
      animation: floatA 10s ease-in-out infinite;
    }
    body::before{
      background:
        radial-gradient(520px 340px at 20% 25%, rgba(51,214,255,.35), transparent 60%),
        radial-gradient(620px 420px at 80% 30%, rgba(255,138,31,.30), transparent 62%),
        radial-gradient(560px 420px at 55% 78%, rgba(51,214,255,.18), transparent 65%);
    }
    body::after{
      opacity:.60;
      animation: floatB 12s ease-in-out infinite;
      background:
        radial-gradient(520px 360px at 75% 80%, rgba(255,138,31,.22), transparent 62%),
        radial-gradient(680px 420px at 30% 70%, rgba(51,214,255,.20), transparent 62%);
    }
    @keyframes floatA{
      0%{transform:translate3d(-2%, -1%, 0) scale(1.02)}
      50%{transform:translate3d(2%, 1%, 0) scale(1.06)}
      100%{transform:translate3d(-2%, -1%, 0) scale(1.02)}
    }
    @keyframes floatB{
      0%{transform:translate3d(2%, 2%, 0) scale(1.00)}
      50%{transform:translate3d(-2%, -1%, 0) scale(1.04)}
      100%{transform:translate3d(2%, 2%, 0) scale(1.00)}
    }

    /* Logo premium glow ring */
    .logo{
      position:relative;
      isolation:isolate;
    }
    
    @keyframes ring{
      to{ transform: rotate(360deg); }
    }

    /* Micro pulse on title */
    .title{
      text-shadow: 0 10px 28px rgba(0,0,0,.50);
      animation: titlePulse 2.2s ease-in-out infinite;
    }
    @keyframes titlePulse{
      0%,100%{filter:brightness(1.00)}
      50%{filter:brightness(1.08)}
    }

  </style>
</head>
<body>
  <div class="box">
    <div class="topGlow"></div>
    <div class="botGlow"></div>

    <div class="chip" id="phase">Iniciando</div>

    <div class="logo"><img src="marcklogo.png" alt="MarckBusiness"></div>
    <div class="title">MarckBusiness</div>
    <div class="subtitle" id="msg">Preparando el sistema…</div>

    <div class="row">
      <div class="spinner"></div>
      <div class="subtitle" id="step">Cargando componentes</div>
    </div>

    <div class="bar"><div id="barFill"></div></div>
    <div class="subtitle" id="pct" style="margin-top:8px; font-weight:900; letter-spacing:.3px; opacity:.9">0%</div>
    <audio id="startSound" src="TONO3.mp3" preload="auto"></audio>
    <audio id="doneSound" src="TONO3.mp3" preload="auto"></audio>
    <div class="footer">Por favor espera…</div>
  </div>

<script>
  const REDIRECT_URL = "https://marckbussisnes.github.io/ESTADO_DE_RESULTADOS/";
  const TOTAL_MS = 4000;

  // 🔊 Sonido al abrir el splash (best-effort; algunos navegadores bloquean autoplay sin interacción)
  try{
    const a0 = document.getElementById("startSound");
    if(a0){
      a0.volume = 0.35;
      const p0 = a0.play();
      if(p0 && p0.catch) p0.catch(()=>{});
    }
  }catch(e){}

  const steps = [
    ["Iniciando",  "Cargando componentes"],
    ["Validando",  "Verificando licencia"],
    ["Cargando",   "Abriendo sistema"]
  ];

  const phaseEl = document.getElementById("phase");
  const stepEl  = document.getElementById("step");
  const msgEl   = document.getElementById("msg");
  const pctEl   = document.getElementById("pct");
  const barFill = document.getElementById("barFill");
  const box     = document.querySelector(".box");

  const t0 = performance.now();
  let lastPhase = -1;

  function tick(now){
    const elapsed = Math.max(0, now - t0);
    const p = Math.min(1, elapsed / TOTAL_MS);

    // progreso
    const pct = Math.round(p * 100);
    if(pctEl) pctEl.textContent = pct + "%";
    if(barFill) barFill.style.width = pct + "%";

    // fases (0,1,2) distribuidas en el tiempo
    const phaseIdx = p < 0.34 ? 0 : (p < 0.70 ? 1 : 2);
    if(phaseIdx !== lastPhase){
      lastPhase = phaseIdx;
      if(phaseEl) phaseEl.textContent = steps[phaseIdx][0];
      if(stepEl)  stepEl.textContent  = steps[phaseIdx][1];
      if(msgEl){
        msgEl.textContent =
          phaseIdx === 0 ? "Preparando el sistema…" :
          phaseIdx === 1 ? "Validación rápida y segura…" :
                           "Últimos ajustes…";
      }
    }

    if(p < 1){
      requestAnimationFrame(tick);
    }else{
      // salida elegante
      try{ box && box.classList.add("exit"); }catch(e){}
      // sonido suave al completar (puede ser bloqueado por autoplay en algunos navegadores)
      try{
        const a = document.getElementById("doneSound");
        if(a){
          a.volume = 0.35;
          const p = a.play();
          if(p && p.catch) p.catch(()=>{});
        }
      }catch(e){}
      // Abrir el destino mientras suena el audio (mejor experiencia)
      let opened = null;
      try{
        opened = window.open(REDIRECT_URL, "_blank");
      }catch(e){}

      // Si el navegador bloquea popups, esperamos a que termine el audio y redirigimos aquí.
      const fallbackRedirect = ()=>{
        try{ window.location.href = REDIRECT_URL; }catch(e){}
      };

      try{
        const a = document.getElementById("doneSound");
        if(a){
          const onEnd = ()=>{
            a.removeEventListener("ended", onEnd);
            // Si no se pudo abrir nueva pestaña, redirige en esta.
            if(!opened) fallbackRedirect();
          };
          a.addEventListener("ended", onEnd);
          // En caso de que no dispare "ended" (autoplay bloqueado), fallback en 2.5s
          setTimeout(()=>{ if(!opened) fallbackRedirect(); }, 2500);
        }else{
          // Sin audio: redirige normal
          setTimeout(fallbackRedirect, 200);
        }
      }catch(e){
        setTimeout(fallbackRedirect, 600);
      }
    }
  }

  requestAnimationFrame(tick);
</script>
</body>
</html>
