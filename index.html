<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Splash</title>
  <style>
    :root{
      --bg:#071423;
      --panel:rgba(10, 26, 45, .88);
      --border:rgba(255,255,255,.12);
      --celeste:#33D6FF;
      --naranja:#FF8A1F;
      --txt:#ffffff;
    }
    body{
      margin:0; height:100vh; display:grid; place-items:center;
      background:
        radial-gradient(700px 420px at 18% 18%, rgba(51,214,255,.28), transparent 60%),
        radial-gradient(700px 420px at 85% 25%, rgba(255,138,31,.22), transparent 60%),
        linear-gradient(180deg, #06111f, var(--bg));
      color:var(--txt);
      font-family:system-ui,Segoe UI,Roboto,Arial;
      user-select:none;
    }
    .box{
      width: 460px; height: 285px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 24px 70px rgba(0,0,0,.50);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:10px;
      position:relative;
      overflow:hidden;
      transition: transform .25s ease, opacity .25s ease, filter .25s ease;
    }
    .box.exit{ opacity:0; transform: scale(.985); filter: blur(1px); }

    .topGlow{
      position:absolute; inset:-120px -180px auto auto;
      width:340px; height:340px; border-radius:999px;
      background: radial-gradient(circle at 30% 30%, rgba(51,214,255,.40), rgba(51,214,255,0) 65%);
      pointer-events:none;
      filter: blur(2px);
    }
    .botGlow{
      position:absolute; inset:auto auto -140px -180px;
      width:360px; height:360px; border-radius:999px;
      background: radial-gradient(circle at 60% 60%, rgba(255,138,31,.35), rgba(255,138,31,0) 65%);
      pointer-events:none;
      filter: blur(2px);
    }
    .logo{
      width:90px; height:90px; border-radius:20px;
      background: rgba(255,255,255,.06);
      border:1px solid var(--border);
      display:grid; place-items:center;
      overflow:hidden;
    }
    .logo img{ width:100%; height:100%; object-fit:contain; padding:10px; }

    .title{
      font-weight:950; letter-spacing:.4px; font-size:18px;
    }
    .subtitle{
      opacity:.82; font-size:13px;
    }

    .row{ display:flex; align-items:center; gap:10px; margin-top:10px; }

    .spinner{
      width:18px;height:18px;border-radius:50%;
      border:3px solid rgba(255,255,255,.18);
      border-top-color: var(--celeste);
      animation: spin .85s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg);} }

    .bar{
      width: 80%; height: 8px; border-radius: 999px;
      background: rgba(255,255,255,.10);
      overflow:hidden;
      margin-top: 14px;
      border: 1px solid rgba(255,255,255,.10);
    }
    .bar > div{
      height:100%; width:0%;
      background: linear-gradient(90deg, var(--celeste), var(--naranja));
      border-radius:999px;
      position:relative;
      transition: width .22s ease;
    }
    .bar > div::after{
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
      transform: translateX(-60%);
      animation: shimmer 1.1s ease-in-out infinite;
    }
    @keyframes shimmer{
      0%{ transform: translateX(-60%); opacity:.55 }
      50%{ transform: translateX(60%); opacity:1 }
      100%{ transform: translateX(120%); opacity:.55 }
    }

    .footer{
      position:absolute; bottom:12px; left:0; right:0;
      text-align:center; font-size:11px; opacity:.70;
    }
    .chip{
      position:absolute; top:12px; right:12px;
      font-size:11px; padding:6px 10px; border-radius:999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.06);
      opacity:.85;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="topGlow"></div>
    <div class="botGlow"></div>

    <div class="chip" id="phase">Iniciando</div>

    <div class="logo"><img src="marcklogo.png" alt="MarckBusiness"></div>
    <div class="title">MarckBusiness</div>
    <div class="subtitle" id="msg">Preparando el sistema…</div>

    <div class="row">
      <div class="spinner"></div>
      <div class="subtitle" id="step">Cargando componentes</div>
    </div>

    <div class="bar"><div id="barFill"></div></div>
    <div class="subtitle" id="pct" style="margin-top:8px; font-weight:900; letter-spacing:.3px; opacity:.9">0%</div>

    <div class="footer">Por favor espera…</div>
  </div>

<script>
  const REDIRECT_URL = "https://marckbussisnes.github.io/ESTADO_DE_RESULTADOS/";
  const TOTAL_MS = 4000;

  const steps = [
    ["Iniciando",  "Cargando componentes"],
    ["Validando",  "Verificando licencia"],
    ["Cargando",   "Abriendo sistema"]
  ];

  const phaseEl = document.getElementById("phase");
  const stepEl  = document.getElementById("step");
  const msgEl   = document.getElementById("msg");
  const pctEl   = document.getElementById("pct");
  const barFill = document.getElementById("barFill");
  const box     = document.querySelector(".box");

  const t0 = performance.now();
  let lastPhase = -1;

  function tick(now){
    const elapsed = Math.max(0, now - t0);
    const p = Math.min(1, elapsed / TOTAL_MS);

    const pct = Math.round(p * 100);
    if(pctEl) pctEl.textContent = pct + "%";
    if(barFill) barFill.style.width = pct + "%";

    const phaseIdx = p < 0.34 ? 0 : (p < 0.70 ? 1 : 2);
    if(phaseIdx !== lastPhase){
      lastPhase = phaseIdx;
      if(phaseEl) phaseEl.textContent = steps[phaseIdx][0];
      if(stepEl)  stepEl.textContent  = steps[phaseIdx][1];
      if(msgEl){
        msgEl.textContent =
          phaseIdx === 0 ? "Preparando el sistema…" :
          phaseIdx === 1 ? "Validación rápida y segura…" :
                           "Últimos ajustes…";
      }
    }

    if(p < 1){
      requestAnimationFrame(tick);
    }else{
      try{ box && box.classList.add("exit"); }catch(e){}
      setTimeout(()=>{ window.location.href = REDIRECT_URL; }, 220);
    }
  }

  requestAnimationFrame(tick);
</script>
</body>
</html>
